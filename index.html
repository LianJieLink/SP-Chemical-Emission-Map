<script>
window.makePopupDraggable = function(e) {
    let popupContainer = e.popup._container;
    // 移除 dataset.draggable 檢查以解決關閉後重開無法拖曳的 Bug
    let header = popupContainer.querySelector('.drag-header');
    if (!header) return;
    
    let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
    header.onmousedown = function(ev) {
        ev = ev || window.event;
        ev.preventDefault();
        pos3 = ev.clientX;
        pos4 = ev.clientY;
        document.onmouseup = closeDragElement;
        document.onmousemove = elementDrag;
    };
    function elementDrag(ev) {
        ev = ev || window.event;
        ev.preventDefault();
        pos1 = pos3 - ev.clientX;
        pos2 = pos4 - ev.clientY;
        pos3 = ev.clientX;
        pos4 = ev.clientY;
        let mb = parseInt(window.getComputedStyle(popupContainer).marginBottom || 0);
        let ml = parseInt(window.getComputedStyle(popupContainer).marginLeft || 0);
        popupContainer.style.marginBottom = (mb + pos2) + "px";
        popupContainer.style.marginLeft = (ml - pos1) + "px";
    }
    function closeDragElement() {
        document.onmouseup = null;
        document.onmousemove = null;
    }
};

    // Create highlight layer group
    const highlightLayer = L.featureGroup().addTo(map);

    // Create Leaflet Control
    const SearchControl = L.Control.extend({
        options: { position: 'topleft' },
        onAdd: function (map) {
            let container = L.DomUtil.create('div', 'chem-search-control leaflet-bar leaflet-control');
            L.DomEvent.disableClickPropagation(container);
            
            let icon = L.DomUtil.create('div', 'chem-search-icon', container);
            icon.innerHTML = '🔍';
            icon.title = 'Search Chemicals';
            
            let panel = L.DomUtil.create('div', 'chem-search-panel', container);
            
            let header = L.DomUtil.create('div', 'chem-search-header', panel);
            let title = L.DomUtil.create('strong', '', header);
            title.innerText = 'Search Chemicals';
            
            let closeBtn = L.DomUtil.create('span', '', header);
            closeBtn.innerHTML = '✖';
            closeBtn.style.cursor = 'pointer';
            
            let inputGroup = L.DomUtil.create('div', '', panel);
            let input = L.DomUtil.create('input', '', inputGroup);
            input.type = 'text';
            input.placeholder = 'Chemical Names...';
            input.style.width = '120px';
            
            let searchBtn = L.DomUtil.create('button', '', inputGroup);
            searchBtn.innerText = 'Search';
            searchBtn.style.marginLeft = '5px';
            
            let clearBtn = L.DomUtil.create('button', '', inputGroup);
            clearBtn.innerText = 'Clear';
            clearBtn.style.marginLeft = '5px';
            
            let resultsDiv = L.DomUtil.create('div', 'chem-search-results', panel);
            
            icon.onclick = function() {
                icon.style.display = 'none';
                panel.classList.add('active');
            };
            
            closeBtn.onclick = function() {
                panel.classList.remove('active');
                icon.style.display = 'block';
            };
            
            function performSearch() {
                highlightLayer.clearLayers();
                resultsDiv.innerHTML = '';
                let term = input.value.trim().toLowerCase();
                if(!term) return;
                
                let matches = [];
                for (let compName in searchData) {
                    let comp = searchData[compName];
                    let found = false;
                    for (let c of comp.all_chemicals) {
                        if (c.toLowerCase().includes(term)) {
                            found = true;
                            break;
                        }
                    }
                    if (found) {
                        matches.push(compName);
                        // Draw polygon
                        L.polygon(comp.poly, {
                            color: 'orangered',
                            fillColor: 'orangered',
                            fillOpacity: 0.5,
                            weight: 2
                        }).addTo(highlightLayer).bindTooltip(compName);
                        
                        // Check pipes
                        for (let p of comp.pipes) {
                            let pipeMatch = false;
                            for(let pc of p.chemicals) {
                                if (pc.toLowerCase().includes(term)) {
                                    pipeMatch = true;
                                    break;
                                }
                            }
                            if(pipeMatch) {
                                L.circleMarker(p.location, {
                                    radius: 6,
                                    color: '#d35400',
                                    fillColor: 'orangered',
                                    fillOpacity: 1.0,
                                    weight: 2
                                }).addTo(highlightLayer).bindTooltip("煙道含有: " + term);
                            }
                        }
                    }
                }
                
                if (matches.length > 0) {
                    let ul = document.createElement('ul');
                    matches.forEach(m => {
                        let li = document.createElement('li');
                        li.innerText = m;
                        ul.appendChild(li);
                    });
                    resultsDiv.appendChild(ul);
                } else {
                    resultsDiv.innerText = 'No matching results';
                }
            }
            
            searchBtn.onclick = performSearch;
            input.onkeypress = function(e) { if(e.key === 'Enter') performSearch(); };
            
            clearBtn.onclick = function() {
                input.value = '';
                highlightLayer.clearLayers();
                resultsDiv.innerHTML = '';
            };
            
            return container;
        }
    });
    
    map.addControl(new SearchControl());
});
